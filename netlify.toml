[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA: qualquer rota cai no index.html (o app faz o roteamento no cliente).
# As rotas /api/* são resolvidas antes, pelo config.path da própria
# function em netlify/functions/aria.ts.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
